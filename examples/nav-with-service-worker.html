<!doctype html>

<body>
  <script src="highlight.js"></script>
  <header>
    <nav>
      <a href="?page=1">Page 1</a>
      <a href="?page=2">Page 2</a>
      <a href="?page=3">Page 3</a>
    </nav>
  </header>
  <main>
    <div id="content"><?start name="content">Loading...</div>
  </main>
</body>
<script>

  async function navigate(url) {
    const page = new URL(url).searchParams.get("page") || 1;
    const stream = document.body.streamAppendHTMLUnsafe();
    const response = await fetch("/content?page=" + page);
    await response.body
      .pipeThrough(new TextDecoderStream())
      .pipeTo(stream);
  }
  const loaded = new Promise((resolve) => {
    window.onload = async () => {
      navigator.serviceWorker.register("./sw.js");
      await navigator.serviceWorker.ready;
      console.log("Service worker ready");
      await navigate(location.href);
      resolve();
    };
  });

  navigation.addEventListener("navigate", async (event) => {
    if (event.canIntercept) {
      event.intercept({
        async handler() {
          await loaded;
          await navigate(event.destination.url);
        }
      });
    }
  });
</script>
